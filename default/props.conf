[netkit:ping]
KV_MODE = json
FIELDALIAS-netkit_dest_port = port AS dest_port
FIELDALIAS-netkit_latency = avg_ms AS latency
EVAL-action = if(reachable=="true", "allowed", "blocked")
EVAL-app = "tcp"
EVAL-direction = "outbound"
EVAL-dvc = host
EVAL-protocol = "ip"
EVAL-response_time = avg_ms/1000
EVAL-src = host
EVAL-transport = "tcp"
EVAL-vendor_product = "NetKit"

[netkit:speedtest]
KV_MODE = json
FIELDALIAS-netkit_bytes_in = bytes_received AS bytes_in
FIELDALIAS-netkit_bytes_out = bytes_sent AS bytes_out
FIELDALIAS-netkit_duration = duration_s AS duration
FIELDALIAS-netkit_latency = rtt_ms AS latency
EVAL-action = if(ok=="true", "allowed", "blocked")
EVAL-app = "https"
EVAL-bytes = bytes_received + bytes_sent
EVAL-dest = "speed.cloudflare.com"
EVAL-dest_port = 443
EVAL-dvc = host
EVAL-protocol = "ip"
EVAL-response_time = rtt_ms/1000
EVAL-src = host
EVAL-transport = "tcp"
EVAL-vendor_product = "NetKit"

[netkit:tls]
KV_MODE = json
FIELDALIAS-netkit_tls_dest_port = port AS dest_port
FIELDALIAS-netkit_tls_ssl_start = not_before AS ssl_start_time
FIELDALIAS-netkit_tls_ssl_end = not_after AS ssl_end_time
FIELDALIAS-netkit_tls_subject_cn = subject_cn AS ssl_subject_common_name
FIELDALIAS-netkit_tls_issuer_cn = issuer_cn AS ssl_issuer_common_name
FIELDALIAS-netkit_tls_subject = subject AS ssl_subject
FIELDALIAS-netkit_tls_issuer = issuer AS ssl_issuer
FIELDALIAS-netkit_tls_subject_org = subject_org AS ssl_subject_organization
FIELDALIAS-netkit_tls_subject_unit = subject_unit AS ssl_subject_unit
FIELDALIAS-netkit_tls_subject_locality = subject_locality AS ssl_subject_locality
FIELDALIAS-netkit_tls_subject_state = subject_state AS ssl_subject_state
FIELDALIAS-netkit_tls_subject_email = subject_email AS ssl_subject_email
FIELDALIAS-netkit_tls_issuer_org = issuer_org AS ssl_issuer_organization
FIELDALIAS-netkit_tls_issuer_unit = issuer_unit AS ssl_issuer_unit
FIELDALIAS-netkit_tls_issuer_locality = issuer_locality AS ssl_issuer_locality
FIELDALIAS-netkit_tls_issuer_state = issuer_state AS ssl_issuer_state
FIELDALIAS-netkit_tls_issuer_email = issuer_email AS ssl_issuer_email
FIELDALIAS-netkit_tls_serial = serial AS ssl_serial
FIELDALIAS-netkit_tls_hash = cert_sha256 AS ssl_hash
FIELDALIAS-netkit_tls_eku = "eku{}" AS eku
FIELDALIAS-netkit_tls_san = "san{}" AS san
FIELDALIAS-netkit_tls_key_usage = "key_usage{}" AS key_usage
LOOKUP-netkit_tls_eku_name = netkit_eku_oid oid AS eku OUTPUT eku_name
LOOKUP-netkit_tls_key_usage_name = netkit_key_usage key_usage OUTPUT key_usage_name
LOOKUP-netkit_tls_sig = netkit_sig_algorithm sig_algorithm OUTPUT sig_algorithm_name sig_hash_algorithm
EVAL-transport = "tcp"
EVAL-ssl_version = if(isnull('tls_version') OR 'tls_version'=="null", null(), 'tls_version')
EVAL-ssl_is_valid = if('verify_ok'==1, 1, 0)
EVAL-action = if('verify_ok'==1, "success", "failure")
EVAL-status = case('verify_ok'==1, "valid", isnotnull('cert_sha256') AND 'cert_sha256'!="null", "invalid", like('verify_error', "cryptography unavailable%"), "error", 1==1, "unreachable")
EVAL-error = case('verify_ok'==1, null(), isnull('verify_error') OR 'verify_error'=="null", "unknown", 1==1, 'verify_error')
EVAL-reason = case('verify_ok'==1, "verified", isnull('verify_error') OR 'verify_error'=="null", "unknown", 1==1, 'verify_error')
EVAL-issuer_display = case(isnotnull('issuer_org') AND isnotnull('issuer_cn') AND 'issuer_cn'!="null", 'issuer_org'." (".'issuer_cn'.")", isnotnull('issuer_org'), 'issuer_org', isnotnull('issuer_cn') AND 'issuer_cn'!="null", 'issuer_cn', 1==1, null())
EVAL-src = host
EVAL-dvc = host
EVAL-vendor_product = "NetKit"
