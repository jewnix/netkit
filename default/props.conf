[netkit:ping]
KV_MODE = json
FIELDALIAS-netkit_dest_port = port AS dest_port
FIELDALIAS-netkit_latency = avg_ms AS latency
EVAL-action = if(reachable=="true", "allowed", "blocked")
EVAL-app = "tcp"
EVAL-direction = "outbound"
EVAL-dvc = host
EVAL-protocol = "ip"
EVAL-response_time = avg_ms/1000
EVAL-src = host
EVAL-transport = "tcp"
EVAL-vendor_product = "NetKit"

[netkit:speedtest]
KV_MODE = json
FIELDALIAS-netkit_bytes_in = bytes_received AS bytes_in
FIELDALIAS-netkit_bytes_out = bytes_sent AS bytes_out
FIELDALIAS-netkit_duration = duration_s AS duration
FIELDALIAS-netkit_latency = rtt_ms AS latency
EVAL-action = if(ok=="true", "allowed", "blocked")
EVAL-app = "https"
EVAL-bytes = bytes_received + bytes_sent
EVAL-dest = "speed.cloudflare.com"
EVAL-dest_port = 443
EVAL-dvc = host
EVAL-protocol = "ip"
EVAL-response_time = rtt_ms/1000
EVAL-src = host
EVAL-transport = "tcp"
EVAL-vendor_product = "NetKit"
