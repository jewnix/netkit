[NetKit - Certificate expiring soon]
search = `netkit_index` sourcetype=netkit:tls | stats latest(days_to_expiry) as days_to_expiry latest(not_after) as not_after latest(subject_cn) as subject_cn latest(ca) as ca by target | where isnotnull(days_to_expiry) AND days_to_expiry <= `netkit_cert_expiry_warning_days`
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 20 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = target
alert.suppress.period = 43200s
description = A monitored TLS certificate is at or within the configured warning window before expiry.

[NetKit - Certificate validation failed]
search = `netkit_index` sourcetype=netkit:tls | stats latest(verify_ok) as verify_ok latest(verify_error) as verify_error latest(ca) as ca by target | where verify_ok=0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = target,verify_error
alert.suppress.period = 21600s
description = A monitored TLS certificate stopped verifying against its configured trust anchors.

[NetKit - Certificate changed]
search = `netkit_index` sourcetype=netkit:tls | sort 0 target _time | streamstats current=f last(cert_sha256) as prev_sha256 by target | where isnotnull(cert_sha256) AND isnotnull(prev_sha256) AND cert_sha256!=prev_sha256 | stats latest(cert_sha256) as cert_sha256 latest(prev_sha256) as prev_sha256 latest(subject_cn) as subject_cn by target
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1
alert.severity = 3
alert.suppress = 1
alert.suppress.fields = target,cert_sha256
alert.suppress.period = 86400s
description = A monitored TLS certificate fingerprint changed since the previous observation.
